<svg xmlns="http://www.w3.org/2000/svg" width="940" height="690" viewBox="0 0 940 690">
  <rect width="940" height="690" fill="#ffffff"/>
  <style>
    .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
    .box { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
    .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .warn { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .text { font: 15px Arial, sans-serif; fill: #111827; }
    .small { font: 13px Arial, sans-serif; fill: #374151; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <text x="470" y="34" text-anchor="middle" class="title">İkinci Firmware Yerleşim ve Aktivasyon Stratejisi</text>

  <rect x="310" y="68" width="320" height="56" rx="8" class="box"/>
  <text x="470" y="92" text-anchor="middle" class="text">old-firmware fallback olarak korunur</text>
  <text x="470" y="112" text-anchor="middle" class="small">Persistent güvenli geri dönüş imajı</text>

  <rect x="310" y="152" width="320" height="56" rx="8" class="box"/>
  <text x="470" y="176" text-anchor="middle" class="text">new-firmware page 0 user/update</text>
  <text x="470" y="196" text-anchor="middle" class="small">slotuna yerleştirilir</text>

  <rect x="310" y="236" width="320" height="56" rx="8" class="box"/>
  <text x="470" y="260" text-anchor="middle" class="text">Boyut ve adres sınırları</text>
  <text x="470" y="280" text-anchor="middle" class="small">build sonrası kontrol edilir</text>

  <rect x="310" y="320" width="320" height="56" rx="8" class="box"/>
  <text x="470" y="344" text-anchor="middle" class="text">Üretim uyarlamasında CRC</text>
  <text x="470" y="364" text-anchor="middle" class="small">ve metadata bilgisi hazırlanır</text>

  <polygon points="470,410 640,480 470,550 300,480" class="decision"/>
  <text x="470" y="472" text-anchor="middle" class="text">Bootloader imajı</text>
  <text x="470" y="492" text-anchor="middle" class="text">geçerli kabul ediyor mu?</text>

  <rect x="675" y="452" width="210" height="58" rx="8" class="ok"/>
  <text x="780" y="476" text-anchor="middle" class="text">new-firmware başlatılır</text>
  <text x="780" y="496" text-anchor="middle" class="small">User/update imajı</text>

  <rect x="55" y="452" width="210" height="58" rx="8" class="warn"/>
  <text x="160" y="476" text-anchor="middle" class="text">old-firmware ile devam</text>
  <text x="160" y="496" text-anchor="middle" class="small">Fallback korunur</text>

  <rect x="310" y="595" width="320" height="56" rx="8" class="box"/>
  <text x="470" y="619" text-anchor="middle" class="text">Metadata / rollback mekanizması</text>
  <text x="470" y="639" text-anchor="middle" class="small">gelecek üretim geliştirmesidir</text>

  <path class="arrow" d="M470 124 V152"/>
  <path class="arrow" d="M470 208 V236"/>
  <path class="arrow" d="M470 292 V320"/>
  <path class="arrow" d="M470 376 V410"/>
  <path class="arrow" d="M640 480 H675"/>
  <path class="arrow" d="M300 480 H265"/>
  <path class="arrow" d="M780 510 V623 H630"/>
  <path class="arrow" d="M160 510 V623 H310"/>
  <text x="655" y="470" class="small">Evet</text>
  <text x="286" y="470" text-anchor="end" class="small">Hayır</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
